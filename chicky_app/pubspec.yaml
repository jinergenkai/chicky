name: chicky_app
description: Chicky - AI English Companion App
version: 1.0.0+1
publish_to: "none"

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  supabase_flutter: ^2.8.4
  dio: ^5.8.0
  web_socket_channel: ^3.0.2
  porcupine_flutter: ^4.0.0
  record: ^6.2.0
  just_audio: ^0.9.42
  flutter_card_swiper: ^7.0.1
  shimmer: ^3.0.0
  hive_flutter: ^1.1.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  go_router: ^14.8.1
  path_provider: ^2.1.5
  flutter_dotenv: ^5.2.1
  cupertino_icons: ^1.0.8
  mesh_gradient: ^1.3.8
  lucide_icons: ^0.257.0
  camera: ^0.11.0
  google_mlkit_text_recognition: ^0.14.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.7.0
  hive_generator: ^2.0.1
  riverpod_generator: ^2.6.1
  flutter_lints: ^5.0.0
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/avatar/
    - assets/model/wakeword/
    - assets/audio/
    - .env
