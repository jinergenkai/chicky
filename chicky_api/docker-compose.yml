version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://chicky:chicky_password@postgres:5432/chicky
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./app:/app/app  # hot-reload in dev

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chicky
      POSTGRES_PASSWORD: chicky_password
      POSTGRES_DB: chicky
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../supabase/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chicky -d chicky"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
